services:
  cf-build:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm run cf-build
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://deepintaj.com}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for wrangler commands}

  cf-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm run deploy
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://deepintaj.com}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for deployment}
